spring.application.name=wmpp-demo

# runtime roles: mono | gateway | scheduler | pusher | registry
wmpp.role=mono

# admin protection for FR-001 APIs
wmpp.admin.token=change-me

# app registry persistence (file-based)
wmpp.appRegistry.file=data/apps.json

# pusher role identity and registry address (for microservices mode)
wmpp.pusher.id=pusher-1
wmpp.registry.baseUrl=http://localhost:8090

# scheduler address (for gateway role)
wmpp.scheduler.baseUrl=http://localhost:8081

# pusher nodes (for scheduler role)
# Defaults are local-dev friendly; override via environment in server deployments.
wmpp.pusher.nodes=${WMPP_PUSHER_NODES:pusher-1=http://127.0.0.1:8084,pusher-2=http://127.0.0.1:8085}

# public endpoints returned by /connect (used by clients outside docker network)
wmpp.public.pusher.nodes=${WMPP_PUBLIC_PUSHER_NODES:Pusher-1=http://127.0.0.1:8084,Pusher-2=http://127.0.0.1:8085}

# actuator (health/metrics) baseline for production ops
management.endpoints.web.exposure.include=health,info,metrics,prometheus,mappings
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized

# reliability (at-least-once, in-memory retry loop)
wmpp.delivery.retry.max-attempts=3
wmpp.delivery.retry.base-delay-ms=500
wmpp.delivery.retry.scan-interval-ms=1000

# push delivery retry baseline (scheduler -> pusher)
wmpp.push.retry.max-attempts=3
wmpp.push.retry.base-delay-ms=200

# scheduler push retry baseline (for scheduler role)
wmpp.push.retry.max-attempts=3
wmpp.push.retry.base-delay-ms=200

# offline delivery (store-and-forward) ttl in minutes
wmpp.offline.message.ttl-minutes=1

# pusher pool auto-scale strategy (read-only display on admin console)
wmpp.pusher.pool.min-instances=2
wmpp.pusher.pool.max-instances=50
wmpp.pusher.pool.scale-up-threshold=800
wmpp.pusher.pool.scale-down-threshold=250

# simple in-memory queue worker settings (setting -> queue -> execution)
wmpp.push.queue.worker-delay-ms=20
